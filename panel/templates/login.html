<!DOCTYPE html>
<html lang="en" class="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ClawPanel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { colors: {
            claw: { bg: '#0a0a0f', card: '#12121a', border: '#1e1e2e', accent: '#6c5ce7', text: '#e2e8f0', muted: '#64748b', danger: '#ef4444' }
        }}}}
    </script>
    <style>
        body { background: #0a0a0f; font-family: system-ui, -apple-system, sans-serif; }
        .glass { background: rgba(18, 18, 26, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(30, 30, 46, 0.5); }
    </style>
</head>
<body class="text-claw-text min-h-screen flex items-center justify-center">
    <div class="glass rounded-2xl p-8 w-full max-w-sm" style="box-shadow: 0 0 40px rgba(108,92,231,0.1);">
        <div class="text-center mb-8">
            <h1 class="text-2xl font-bold">
                <span class="text-claw-accent">Claw</span>Panel
            </h1>
            <p class="text-claw-muted text-sm mt-1">Sign in to continue</p>
        </div>

        {% if error %}
        <div class="bg-claw-danger/10 border border-claw-danger/30 text-claw-danger text-sm rounded-lg px-4 py-2 mb-4">
            {{ error }}
        </div>
        {% endif %}

        <form method="POST" action="/login" class="space-y-4">
            <div>
                <input type="text" name="username" placeholder="Username"
                    class="w-full bg-claw-bg border border-claw-border text-claw-text rounded-lg px-4 py-3 focus:outline-none focus:border-claw-accent focus:ring-1 focus:ring-claw-accent transition-all"
                    required autofocus>
            </div>
            <div>
                <input type="password" name="password" placeholder="Password"
                    class="w-full bg-claw-bg border border-claw-border text-claw-text rounded-lg px-4 py-3 focus:outline-none focus:border-claw-accent focus:ring-1 focus:ring-claw-accent transition-all"
                    required>
            </div>
            <button type="submit"
                class="w-full bg-claw-accent hover:bg-purple-600 text-white font-medium py-3 rounded-lg transition-all duration-200">
                Sign In
            </button>
        </form>

        <p class="text-center text-claw-muted text-xs mt-6">ClawPanel v2.0</p>
    </div>
</body>
</html>
